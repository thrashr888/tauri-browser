name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }} -p tauri-browser

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }} -p tauri-browser

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../tauri-browser-${{ matrix.target }}.tar.gz tauri-browser
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/tauri-browser.exe" -DestinationPath "tauri-browser-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-browser-${{ matrix.target }}
          path: tauri-browser-${{ matrix.target }}.*

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish plugin crate
        run: cargo publish -p tauri-plugin-debug-bridge --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish CLI crate
        run: cargo publish -p tauri-browser --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}

  homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Compute SHA256 sums
        id: sha
        run: |
          echo "darwin_arm64=$(sha256sum artifacts/tauri-browser-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "darwin_amd64=$(sha256sum artifacts/tauri-browser-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum artifacts/tauri-browser-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(sha256sum artifacts/tauri-browser-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Update Homebrew formula
        uses: thrashr888/homebrew-tap@main
        with:
          formula: tauri-browser
          tag: ${{ github.ref_name }}
          tap-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          darwin-arm64-sha256: ${{ steps.sha.outputs.darwin_arm64 }}
          darwin-amd64-sha256: ${{ steps.sha.outputs.darwin_amd64 }}
          linux-arm64-sha256: ${{ steps.sha.outputs.linux_arm64 }}
          linux-amd64-sha256: ${{ steps.sha.outputs.linux_amd64 }}
          template: |
            class TauriBrowser < Formula
              desc "Lightweight browser built with Tauri and Rust"
              homepage "https://github.com/thrashr888/tauri-browser"
              version "${VERSION}"
              license "MIT"

              on_macos do
                on_arm do
                  url "https://github.com/thrashr888/tauri-browser/releases/download/${TAG}/tauri-browser-aarch64-apple-darwin.tar.gz"
                  sha256 "${SHA_DARWIN_ARM64}"
                end
                on_intel do
                  url "https://github.com/thrashr888/tauri-browser/releases/download/${TAG}/tauri-browser-x86_64-apple-darwin.tar.gz"
                  sha256 "${SHA_DARWIN_AMD64}"
                end
              end

              on_linux do
                on_arm do
                  url "https://github.com/thrashr888/tauri-browser/releases/download/${TAG}/tauri-browser-aarch64-unknown-linux-gnu.tar.gz"
                  sha256 "${SHA_LINUX_ARM64}"
                end
                on_intel do
                  url "https://github.com/thrashr888/tauri-browser/releases/download/${TAG}/tauri-browser-x86_64-unknown-linux-gnu.tar.gz"
                  sha256 "${SHA_LINUX_AMD64}"
                end
              end

              def install
                bin.install "tauri-browser"
              end

              test do
                assert_match "tauri-browser", shell_output("#{bin}/tauri-browser --help")
              end
            end
